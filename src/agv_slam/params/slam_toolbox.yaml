slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Laser
    scan_topic: /scan
    use_scan_matching: true
    minimum_time_interval: 0.0
    

    # Mode
    mode: mapping

    # Performance / stability
    throttle_scans: 2
    minimum_travel_distance: 0.12
    minimum_travel_heading: 0.20
    transform_publish_period: 0.1
    map_update_interval: 1.0

    # Map
    resolution: 0.05
    max_laser_range: 6.0

    # Loop closure
    do_loop_closing: true
    loop_search_maximum_distance: 3.0

    debug_logging: false

    