# Safety Zone Configuration
# Coordinate frame: map
# All polygons defined as [x, y] vertices in map frame
# Zone types: SLOW | STOP | RESTRICTED

safety_zones:

  - name: "picking_corridor_entry"
    type: SLOW
    speed_limit: 0.3
    description: "Approach corridor to picking area. Reduced speed zone."
    polygon:
      - [-2.5,  4.2]
      - [ 2.5,  4.2]
      - [ 2.5,  5.3]
      - [-2.5,  5.3]

  - name: "pallet_pickup_zone"
    type: STOP
    speed_limit: 0.0
    description: "Pallet pickup zone. AGV must stop for loading sequence."
    polygon:
      - [-1.0,  5.3]
      - [ 1.5,  5.3]
      - [ 1.5,  6.3]
      - [-1.0,  6.3]

  - name: "dispatch_dropoff_zone"
    type: SLOW
    speed_limit: 0.25
    description: "Dispatch and dropoff area. Slow zone for pedestrian safety."
    polygon:
      - [-1.5, -0.8]
      - [ 1.5, -0.8]
      - [ 1.5,  1.2]
      - [-1.5,  1.2]

  - name: "warehouse_perimeter"
    type: RESTRICTED
    speed_limit: 0.0
    description: "Perimeter exclusion zone. No AGV operation allowed."
    polygon:
      - [-4.5, -2.0]
      - [-3.0, -2.0]
      - [-3.0,  8.0]
      - [-4.5,  8.0]